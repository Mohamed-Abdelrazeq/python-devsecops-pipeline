---
- name: Configure Jenkins Server
  hosts: jenkins
  become: true

  vars:
    gitleaks_version: "8.30.1"
    gitleaks_arch_map:
      x86_64: x64
      aarch64: arm64
      arm64: arm64

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Upgrade installed packages
      ansible.builtin.apt:
        upgrade: dist

    - name: Install common packages
      ansible.builtin.apt:
        name:
          - git
          - curl
          - unzip
          - python3-pip
          - python3-venv
          - ca-certificates
          - apt-transport-https
          - software-properties-common
        state: present
    # DOCKER SECTION
    - name: Create Docker keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker official repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Update apt cache after adding Docker repository
      ansible.builtin.apt:
        update_cache: yes

    - name: Remove legacy Docker Compose
      ansible.builtin.apt:
        name: docker-compose
        state: absent

    - name: Install Docker Compose plugin
      ansible.builtin.apt:
        name: docker-compose-plugin
        state: present

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
        state: present

    - name: Enable Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Add azureuser to docker group
      ansible.builtin.user:
        name: azureuser
        groups: docker
        append: yes

    - name: Verify Docker Compose plugin
      ansible.builtin.command: docker compose version
      register: compose_version
      changed_when: false

    - name: Show Docker Compose version
      ansible.builtin.debug:
        var: compose_version.stdout

    # GITLEAKS SECTION
    - name: Set Gitleaks architecture
      ansible.builtin.set_fact:
        gitleaks_arch: "{{ gitleaks_arch_map[ansible_architecture] | default('x64') }}"

    - name: Create Gitleaks download directory
      ansible.builtin.file:
        path: /tmp/gitleaks
        state: directory
        mode: "0755"

    - name: Download Gitleaks release archive
      ansible.builtin.get_url:
        url: "https://github.com/gitleaks/gitleaks/releases/download/v{{ gitleaks_version }}/gitleaks_{{ gitleaks_version }}_linux_{{ gitleaks_arch }}.tar.gz"
        dest: "/tmp/gitleaks/gitleaks_{{ gitleaks_version }}_linux_{{ gitleaks_arch }}.tar.gz"
        mode: "0644"

    - name: Extract Gitleaks binary
      ansible.builtin.unarchive:
        src: "/tmp/gitleaks/gitleaks_{{ gitleaks_version }}_linux_{{ gitleaks_arch }}.tar.gz"
        dest: /tmp/gitleaks
        remote_src: yes
        creates: /tmp/gitleaks/gitleaks

    - name: Install Gitleaks binary
      ansible.builtin.copy:
        src: /tmp/gitleaks/gitleaks
        dest: /usr/local/bin/gitleaks
        owner: root
        group: root
        mode: "0755"
        remote_src: yes

    - name: Verify Gitleaks installation
      ansible.builtin.command: /usr/local/bin/gitleaks version
      register: gitleaks_installed_version
      changed_when: false

    - name: Show installed Gitleaks version
      ansible.builtin.debug:
        msg: "Gitleaks {{ gitleaks_installed_version.stdout }} installed"

    # JENKINS SECTION
    - name: Install Java 21
      ansible.builtin.apt:
        name: openjdk-21-jdk
        state: present

    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Jenkins GPG key
      ansible.builtin.shell: |
        curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key \
        | gpg --dearmor \
        | tee /etc/apt/keyrings/jenkins.gpg > /dev/null
      args:
        creates: /etc/apt/keyrings/jenkins.gpg

    - name: Add Jenkins repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/jenkins.gpg] https://pkg.jenkins.io/debian-stable binary/"
        filename: jenkins
        state: present

    - name: Add jenkins user to docker group
      ansible.builtin.user:
        name: jenkins
        groups: docker
        append: yes

    - name: Install Jenkins
      ansible.builtin.apt:
        name: jenkins
        state: present

    - name: Enable Jenkins service
      ansible.builtin.service:
        name: jenkins
        state: started
        enabled: yes

    # TRIVIY SECTION
    - name: Create keyrings directory for Trivy
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Trivy GPG key
      ansible.builtin.get_url:
        url: https://aquasecurity.github.io/trivy-repo/deb/public.key
        dest: /tmp/trivy.key
        mode: "0644"

    - name: Dearmor Trivy GPG key
      ansible.builtin.command:
        cmd: gpg --dearmor -o /etc/apt/keyrings/trivy.gpg /tmp/trivy.key
        creates: /etc/apt/keyrings/trivy.gpg

    - name: Add Trivy repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main"
        filename: trivy
        state: present

    - name: Install Trivy
      ansible.builtin.apt:
        name: trivy
        update_cache: yes
        state: present

    - name: Verify Trivy installation
      ansible.builtin.command: trivy --version
      register: trivy_version
      changed_when: false

    - name: Show installed Trivy version
      ansible.builtin.debug:
        var: trivy_version.stdout

    # DEFECTDOJO SECTION
